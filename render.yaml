services:
  - type: web
    name: streamvault-api
    runtime: node
    plan: free
    buildCommand: pip install yt-dlp && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /api/healthz
    autoDeploy: true
