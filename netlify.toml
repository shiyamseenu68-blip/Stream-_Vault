[build]
  command = "cd artifacts/streamvault && pnpm run build"
  publish = "artifacts/streamvault/dist/public"

[[redirects]]
  from = "/api/*"
  to = "https://your-backend-url.com/api/:splat"
  status = 200
  force = true

[dev]
  command = "pnpm --filter @workspace/streamvault run dev"
  port = 5173
  targetPort = 5173
  autoLaunch = false
